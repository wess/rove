name: Release

# Grant GITHUB_TOKEN permission to create tags & releases
permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'
      - '.github/workflows/release.yml'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile all platforms
        run: bun run compile

      - name: Fix file permissions
        run: |
          chmod +r build/linux-x64/rove
          chmod +r build/darwin-x64/rove
          chmod +r build/darwin-arm64/rove
          chmod +r build/windows-x64/rove.exe

      - name: Read version
        id: get_version
        run: |
          version=$(<VERSION)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package Linux x64
        run: |
          tar -czvf rove-${{ steps.get_version.outputs.version }}-linux-x64.tar.gz \
            -C build/linux-x64 rove

      - name: Package macOS x64
        run: |
          tar -czvf rove-${{ steps.get_version.outputs.version }}-darwin-x64.tar.gz \
            -C build/darwin-x64 rove

      - name: Package macOS ARM64
        run: |
          tar -czvf rove-${{ steps.get_version.outputs.version }}-darwin-arm64.tar.gz \
            -C build/darwin-arm64 rove

      - name: Package Windows x64
        run: |
          zip -j rove-${{ steps.get_version.outputs.version }}-windows-x64.zip \
            build/windows-x64/rove.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          files: |
            rove-${{ steps.get_version.outputs.version }}-linux-x64.tar.gz
            rove-${{ steps.get_version.outputs.version }}-darwin-x64.tar.gz
            rove-${{ steps.get_version.outputs.version }}-darwin-arm64.tar.gz
            rove-${{ steps.get_version.outputs.version }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for VERSION)
        uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: echo "version=$(<VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs and compute SHAs
        id: shas
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.v.outputs.version }}"
          gh release download "v${V}" --repo "${{ github.repository }}" \
            --pattern "rove-${V}-darwin-arm64.tar.gz" \
            --pattern "rove-${V}-darwin-x64.tar.gz" \
            --pattern "rove-${V}-linux-x64.tar.gz" --dir t
          {
            echo "sha_darwin_arm64=$(sha256sum t/rove-${V}-darwin-arm64.tar.gz | cut -d' ' -f1)"
            echo "sha_darwin_x64=$(sha256sum t/rove-${V}-darwin-x64.tar.gz | cut -d' ' -f1)"
            echo "sha_linux_x64=$(sha256sum t/rove-${V}-linux-x64.tar.gz | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: wess/homebrew-packages
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.v.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.shas.outputs.sha_darwin_arm64 }}
          SHA_DARWIN_X64: ${{ steps.shas.outputs.sha_darwin_x64 }}
          SHA_LINUX_X64: ${{ steps.shas.outputs.sha_linux_x64 }}
        run: |
          cat > tap/Formula/rove.rb << RUBY
          class Rove < Formula
            desc "PostgreSQL migrations tool built with Bun and TypeScript"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"

            if OS.mac?
              if Hardware::CPU.intel?
                url "https://github.com/${REPO}/releases/download/v#{version}/rove-#{version}-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              else # ARM
                url "https://github.com/${REPO}/releases/download/v#{version}/rove-#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
            elsif OS.linux?
              url "https://github.com/${REPO}/releases/download/v#{version}/rove-#{version}-linux-x64.tar.gz"
              sha256 "${SHA_LINUX_X64}"
            end

            def install
              bin.install "rove"
            end

            test do
              assert_match "PostgreSQL migrations tool", shell_output("#{bin}/rove --help")
            end
          end
          RUBY

      - name: Push updated formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rove.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
          else
            git commit -m "Update rove to v${{ steps.v.outputs.version }}"
            git push
          fi